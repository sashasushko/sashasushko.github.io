<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Путешествия Александра Сушко</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <style>
      html {
        font-size: 16px;
      }

      body {
        margin: 0;
        color: #3c3c3c;
        font: 1.2em/1.5 "Montserrat", Helvetica, Arial, sans-serif;
      }

      a:link,
      a:visited,
      a:hover {
        border-bottom: 2px solid rgba(10, 132, 255, 0.3);
        color: #0a84ff;
        text-decoration: none;
      }

      a:hover {
        border-bottom-color: rgba(10, 132, 255, 0.7);
      }

      a:active {
        border-bottom-color: rgba(211, 0, 169, 0.5);
        color: #dd00a9;
      }

      h1,
      h2 {
        font-weight: 900;
      }

      h1 {
        margin-top: 0;
        margin-bottom: 0;
        font-size: 1.25em;
        line-height: 1.2;
      }

      .header {
        position: absolute;
        z-index: 2;
        top: 25px;
        left: 15px;
        padding: 7px 25px 9px 15px;
        background-color: #fff;
        border-radius: 10px;
      }

      .title {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }

      .back {
        font-size: 0.6em;
        font-weight: 400;
      }

      .map {
        position: relative;
        z-index: 1;
        width: 100vw;
        height: 100vh;
      }

      @media (min-width: 992px) {
        h1 {
          font-size: 2em;
        }

        .header {
          top: 20px;
          left: 10px;
          padding: 10px 45px 10px 20px;
          border-radius: 15px;
        }

        .back {
          font-size: 0.5em;
        }
      }
    </style>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Montserrat:400,900&amp;subset=cyrillic"
      rel="stylesheet"
    />
  </head>

  <body>
    <header class="header">
      <h1 class="title">
        <a href="/" class="back">Александр Сушко</a>
        Путешествует
      </h1>
    </header>

    <div class="map" id="map"></div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>

    <script type="text/javascript">
      const map = L.map("map", { zoomControl: false }).setView([50, 52], 3);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution:
          'Карты &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>. Иконки &copy; <a href="https://www.flaticon.com/authors/smashicons">Smashicons</a>',
      }).addTo(map);

      L.control
        .zoom({
          position: "bottomright",
        })
        .addTo(map);

      const icon = L.icon({
        iconUrl: "/pin.svg",
        iconSize: [28, 58],
        iconAnchor: [14, 58],
        popupAnchor: [0, 0],
      });

      const iconSoon = L.icon({
        iconUrl: "/pin-soon.svg",
        iconSize: [28, 58],
        iconAnchor: [14, 58],
        popupAnchor: [0, 0],
      });

      fetch("/data.json")
        .then((response) => response.json())
        .then(({ visited, soon }) => {
          visited.forEach(({ title, coords }) => {
            L.marker(coords, { title, icon: icon }).bindPopup(title).addTo(map);
          });
          soon.forEach(({ title, coords }) => {
            L.marker(coords, { title, icon: iconSoon })
              .bindPopup(`${title}<i>, в ближайших планах</i>`)
              .addTo(map);
          });
        })
        .catch((error) => {
          console.error(error);
        });
    </script>
  </body>
</html>
